<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Missile Defence Multiplayer</title>
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" width="1280" height="720" aria-label="Campo di battaglia"></canvas>

      <section class="top-hud" aria-label="Stato partita">
        <div class="game-title">
          <span>Missile Defence</span>
          <strong>Multiplayer</strong>
        </div>
        <div class="stat-row">
          <div><span>Ondata</span><strong id="waveLabel">1</strong></div>
          <div><span>Difficolta</span><strong id="difficultyLabel">Normale</strong></div>
          <div><span>Credito</span><strong id="buildLabel">0</strong></div>
          <div><span>Punti</span><strong id="scoreLabel">0</strong></div>
        </div>
        <div class="top-actions">
          <button id="intelButton" class="icon-button" aria-label="Citta e arsenali" title="Citta e arsenali">ⓘ</button>
          <button id="settingsButton" class="icon-button" aria-label="Impostazioni" title="Impostazioni">⚙</button>
        </div>
      </section>

      <div id="overlay" class="message-overlay">
        <strong>Pronto</strong>
        <span>Mouse: missili. Frecce e spazio: torretta. 1/2/3: arma torretta.</span>
      </div>

      <footer class="control-footer">
        <button id="startButton">Avvia</button>
        <button id="nextWaveButton" disabled>Prossima ondata</button>
        <button id="pauseButton">Pausa</button>
        <div class="quick-weapons">
          <div>
            <span>Missili</span>
            <div class="button-row" id="missileButtons">
              <button data-missile="standard">Std</button>
              <button data-missile="he">HE</button>
              <button data-missile="frag">Frag</button>
              <button data-missile="guided">Guid</button>
              <button data-missile="emp">EMP</button>
            </div>
          </div>
          <div>
            <span>Torretta</span>
            <div class="button-row" id="turretButtons">
              <button data-turret="cannon">1 AA</button>
              <button data-turret="mg">2 MG</button>
              <button data-turret="laser">3 Laser</button>
            </div>
          </div>
        </div>
      </footer>

      <dialog id="settingsDialog" class="dialog">
        <form method="dialog">
          <header>
            <strong>Impostazioni</strong>
            <button aria-label="Chiudi">×</button>
          </header>
          <label>
            Modalita
            <select id="modeSelect">
              <option value="missiles">Giocatore missili, computer torrette</option>
              <option value="turret">Giocatore torretta, computer missili</option>
              <option value="coop">Co-op locale</option>
            </select>
          </label>
          <label>
            Difficolta
            <select id="difficultySelect">
              <option value="cadet">Cadetto</option>
              <option value="normal" selected>Normale</option>
              <option value="veteran">Veterano</option>
              <option value="nightmare">Incubo</option>
            </select>
          </label>
          <label>
            Missile mouse
            <select id="missileSelect">
              <option value="standard">Standard</option>
              <option value="he">HE</option>
              <option value="frag">Frammentazione</option>
              <option value="guided">Guidato</option>
              <option value="emp">EMP</option>
            </select>
          </label>
          <label>
            Arma tastiera
            <select id="turretSelect">
              <option value="cannon">Cannoncino AA</option>
              <option value="mg">Mitragliatrice</option>
              <option value="laser">Laser</option>
            </select>
          </label>
        </form>
      </dialog>

      <dialog id="intelDialog" class="dialog intel-dialog">
        <section>
          <header>
            <strong>Citta e arsenali</strong>
            <button id="closeIntelButton" aria-label="Chiudi">×</button>
          </header>
          <div class="city-dock" id="cities" aria-label="Citta e armi installate"></div>
        </section>
      </dialog>

      <dialog id="buildDialog" class="dialog build-dialog">
        <section>
          <header>
            <div>
              <span>Tra un'ondata e l'altra</span>
              <strong>Costruzione e upgrade</strong>
            </div>
            <button id="closeBuildButton" aria-label="Chiudi">×</button>
          </header>
          <div class="credit-banner">
            <span>Credito disponibile</span>
            <strong id="buildModalLabel">0</strong>
          </div>
          <div class="build-layout">
            <div class="build-cities" id="buildCities"></div>
            <div class="upgrade-grid">
              <button data-upgrade="repair">Ripara citta <span>2</span></button>
              <button data-upgrade="factory">Fabbrica +1 <span>4</span></button>
              <button data-upgrade="launcher">Lanciamissili <span>3</span></button>
              <button data-upgrade="cannon">Cannoncino <span>3</span></button>
              <button data-upgrade="mg">Mitragliatrice <span>3</span></button>
              <button data-upgrade="laser">Laser <span>5</span></button>
              <button data-upgrade="shield">Scudo <span>4</span></button>
              <button data-upgrade="ammo">Munizioni missili <span>3</span></button>
              <button data-upgrade="turretAmmo">Munizioni torretta <span>6</span></button>
              <button data-upgrade="blastRadius">Esplosioni + <span>8</span></button>
              <button data-upgrade="blastLife">Bolla lenta <span>8</span></button>
            </div>
          </div>
          <footer class="build-actions">
            <button id="buildStartWaveButton">Avvia ondata</button>
          </footer>
        </section>
      </dialog>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
