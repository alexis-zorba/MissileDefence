<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 92" role="img" aria-labelledby="title desc" shape-rendering="crispEdges">
  <title id="title">Missile Defence Multiplayer</title>
  <desc id="desc">Logo pixel art anni ottanta con missile, scia e titolo Missile Defence.</desc>
  <defs>
    <filter id="hardGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feFlood flood-color="#55d6be" flood-opacity=".65" result="glow"/>
      <feComposite in="glow" in2="SourceAlpha" operator="in"/>
      <feMorphology operator="dilate" radius="1"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#hardGlow)">
    <rect x="4" y="50" width="14" height="8" fill="#f4bf54"/>
    <rect x="18" y="46" width="14" height="16" fill="#ff8c4a"/>
    <rect x="32" y="42" width="16" height="24" fill="#ff5f5f"/>
    <rect x="48" y="38" width="66" height="32" fill="#e9f6ff"/>
    <rect x="114" y="42" width="20" height="24" fill="#d7e5ea"/>
    <rect x="134" y="50" width="14" height="8" fill="#e9f6ff"/>
    <rect x="74" y="30" width="16" height="8" fill="#69a9ff"/>
    <rect x="74" y="70" width="16" height="8" fill="#69a9ff"/>
    <rect x="56" y="46" width="10" height="8" fill="#020406"/>
    <rect x="74" y="46" width="10" height="8" fill="#020406"/>
    <rect x="92" y="46" width="10" height="8" fill="#020406"/>

    <rect x="6" y="66" width="8" height="8" fill="#55d6be"/>
    <rect x="20" y="72" width="8" height="8" fill="#55d6be"/>
    <rect x="38" y="78" width="8" height="8" fill="#69a9ff"/>
    <rect x="12" y="30" width="8" height="8" fill="#69a9ff"/>
    <rect x="28" y="24" width="8" height="8" fill="#55d6be"/>
  </g>

  <g font-family="'Courier New', 'DejaVu Sans Mono', monospace" font-weight="900" letter-spacing="0">
    <text x="166" y="39" fill="#020406" font-size="34" stroke="#020406" stroke-width="8">MISSILE</text>
    <text x="166" y="39" fill="#e9f6ff" font-size="34">MISSILE</text>
    <text x="168" y="40" fill="#55d6be" font-size="34" opacity=".55">MISSILE</text>

    <text x="166" y="75" fill="#020406" font-size="34" stroke="#020406" stroke-width="8">DEFENCE</text>
    <text x="166" y="75" fill="#f4bf54" font-size="34">DEFENCE</text>
    <text x="168" y="76" fill="#ff5f5f" font-size="34" opacity=".55">DEFENCE</text>
  </g>

  <g fill="#55d6be" opacity=".9">
    <rect x="352" y="12" width="8" height="8"/>
    <rect x="368" y="20" width="8" height="8"/>
    <rect x="386" y="12" width="8" height="8"/>
    <rect x="372" y="70" width="8" height="8"/>
    <rect x="396" y="62" width="8" height="8"/>
  </g>
</svg>
